<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Habit Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1> Habit-tracker </h1>
    
    <div class="add-habit">
      <input type="text" id="habit-input" placeholder="New habit (e.g., Drink water)">
      <button id="add-btn">Add Habit</button>
    </div>

    <div id="habits-list"></div>

    <div class="stats">
      <p>Completed today: <span id="today-count">0</span></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
